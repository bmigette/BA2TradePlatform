[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ba2trade-providers"
version = "0.1.0"
description = "BA2 Trade — market data providers"
requires-python = ">=3.11"
dependencies = [
    "ba2trade-common",
    "requests>=2.32.0",
    "aiohttp>=3.11.0",
    "pandas>=2.2.0,<3.0.0",
    "numpy>=2.0.0",
    "pyarrow>=15",
    "beautifulsoup4>=4.12.0",
    "fmpsdk>=20230123",
    "yfinance>=0.2.40",
    "stockstats>=0.6.2",
    "alpaca-py>=0.21.0",
    "tenacity>=8.2.0",
    "curl_cffi>=0.7.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "import-linter>=2.0", "libcst>=1.4"]

[tool.uv.sources]
ba2trade-common = { git = "ssh://git@github.com/bmigette/BA2TradeCommon.git", branch = "dev" }

[tool.hatch.build.targets.wheel]
packages = ["ba2_providers"]
